<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Roma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0020;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}
.card{width:680px;max-width:98vw;position:relative}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.55;transform:scale(0.94)}}
@keyframes pu2{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.07)}}
@keyframes pu3{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.97)}}
@keyframes sp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0;transform:scale(0.2)}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
@keyframes sw{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
@keyframes sw2{0%,100%{transform:rotate(4deg)}50%{transform:rotate(-4deg)}}
@keyframes beat{0%,100%{transform:scale(1)}40%{transform:scale(1.28)}60%{transform:scale(1.1)}}
.hb{animation:pu 1.9s ease-in-out infinite;transform-origin:340px 230px}
.ily{animation:pu3 2.1s ease-in-out 0.3s infinite;transform-origin:340px 330px}
.roma{animation:pu2 1.7s ease-in-out 0.6s infinite;transform-origin:340px 415px}
.bh1{animation:sw 2.4s ease-in-out infinite;transform-origin:110px 185px}
.bh2{animation:sw2 2.9s ease-in-out infinite;transform-origin:215px 178px}
.bh3{animation:sw 2.1s ease-in-out infinite;transform-origin:340px 172px}
.bh4{animation:sw2 2.7s ease-in-out infinite;transform-origin:465px 178px}
.bh5{animation:sw 3s ease-in-out infinite;transform-origin:570px 185px}
.fh1{animation:fl 2.5s ease-in-out infinite}
.fh2{animation:fl 3s ease-in-out 0.4s infinite}
.fh3{animation:fl 2.2s ease-in-out 0.8s infinite}
.fh4{animation:fl 2.8s ease-in-out 0.2s infinite}
.fh5{animation:fl 2.6s ease-in-out 0.6s infinite}
.fh6{animation:fl 3.1s ease-in-out 0.9s infinite}
.bigheart{animation:beat 1.1s ease-in-out infinite;transform-origin:340px 530px}
.s1{animation:sp 1.1s ease-in-out infinite}
.s2{animation:sp 1.4s ease-in-out 0.25s infinite}
.s3{animation:sp 0.9s ease-in-out 0.5s infinite}
.s4{animation:sp 1.6s ease-in-out 0.75s infinite}
.s5{animation:sp 1.2s ease-in-out 0.1s infinite}
.s6{animation:sp 1.5s ease-in-out 0.6s infinite}
.s7{animation:sp 1s ease-in-out 0.35s infinite}
.s8{animation:sp 1.7s ease-in-out 0.9s infinite}
</style>
</head>
<body>
<div class="card">
<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#1a0533"/>
  <stop offset="50%" stop-color="#0d1a4a"/>
  <stop offset="100%" stop-color="#2a0a1a"/>
</linearGradient>
<linearGradient id="hbg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#FF2D78"/>
  <stop offset="33%" stop-color="#FF6B00"/>
  <stop offset="66%" stop-color="#FFD600"/>
  <stop offset="100%" stop-color="#39FF14"/>
</linearGradient>
<linearGradient id="ily" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#00E5FF"/>
  <stop offset="50%" stop-color="#BF00FF"/>
  <stop offset="100%" stop-color="#FF2D78"/>
</linearGradient>
<linearGradient id="roma" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#FFD600"/>
  <stop offset="50%" stop-color="#FF6B00"/>
  <stop offset="100%" stop-color="#FF2D78"/>
</linearGradient>
</defs>

<rect width="680" height="680" fill="url(#bg)" rx="18"/>
<rect x="3" y="3" width="674" height="674" fill="none" stroke="#FF2D78" stroke-width="2" stroke-dasharray="10,7" rx="16" opacity="0.6"/>

<!-- Stars -->
<circle cx="30" cy="35" r="2" fill="#fff" class="s1"/>
<circle cx="90" cy="18" r="1.5" fill="#FFD600" class="s2"/>
<circle cx="170" cy="28" r="2" fill="#fff" class="s3"/>
<circle cx="260" cy="12" r="1.5" fill="#00E5FF" class="s4"/>
<circle cx="440" cy="15" r="1.5" fill="#FFD600" class="s5"/>
<circle cx="540" cy="30" r="2" fill="#BF00FF" class="s6"/>
<circle cx="630" cy="20" r="1.5" fill="#fff" class="s7"/>
<circle cx="650" cy="50" r="2" fill="#00E5FF" class="s8"/>
<circle cx="50" cy="140" r="1.5" fill="#FF6B00" class="s4"/>
<circle cx="640" cy="130" r="1.5" fill="#39FF14" class="s6"/>
<circle cx="55" cy="580" r="1.5" fill="#FF2D78" class="s2"/>
<circle cx="635" cy="570" r="1.5" fill="#BF00FF" class="s4"/>

<!-- Confetti -->
<rect x="45" y="60" width="9" height="9" fill="#FF2D78" rx="2" transform="rotate(30 49 64)"/>
<rect x="610" y="55" width="9" height="9" fill="#FFD600" rx="2" transform="rotate(45 614 59)"/>
<rect x="175" y="72" width="8" height="8" fill="#00E5FF" rx="2" transform="rotate(20 179 76)"/>
<rect x="470" y="65" width="8" height="8" fill="#BF00FF" rx="2" transform="rotate(55 474 69)"/>
<circle cx="115" cy="78" r="5" fill="#39FF14"/>
<circle cx="560" cy="72" r="5" fill="#FF6B00"/>

<!-- Sparkles -->
<g class="s1"><text x="28" y="210" font-size="22" fill="#FFD600">✦</text></g>
<g class="s3"><text x="636" y="200" font-size="18" fill="#FF2D78">✦</text></g>
<g class="s5"><text x="42" y="450" font-size="20" fill="#00E5FF">✦</text></g>
<g class="s7"><text x="624" y="440" font-size="18" fill="#39FF14">✦</text></g>
<g class="s2"><text x="180" y="625" font-size="14" fill="#BF00FF">✦</text></g>
<g class="s6"><text x="470" y="630" font-size="16" fill="#FFD600">✦</text></g>

<!-- Heart balloon 1 - Pink -->
<g class="bh1">
  <path d="M110,148 C110,128 90,118 90,138 C90,118 70,128 70,148 C70,168 110,193 110,193 C110,193 150,168 150,148 C150,128 130,118 130,138 C130,118 110,128 110,148Z" fill="#FF2D78"/>
  <ellipse cx="98" cy="140" rx="8" ry="5" fill="#FF79A8" opacity="0.5"/>
  <path d="M110 193 Q106 210 110 226 Q114 240 107 255" stroke="#FF2D78" stroke-width="2" fill="none"/>
</g>

<!-- Heart balloon 2 - Orange -->
<g class="bh2">
  <path d="M215,142 C215,122 195,112 195,132 C195,112 175,122 175,142 C175,162 215,187 215,187 C215,187 255,162 255,142 C255,122 235,112 235,132 C235,112 215,122 215,142Z" fill="#FF6B00"/>
  <ellipse cx="203" cy="134" rx="8" ry="5" fill="#FFB366" opacity="0.5"/>
  <path d="M215 187 Q211 204 215 220 Q219 234 212 249" stroke="#FF6B00" stroke-width="2" fill="none"/>
</g>

<!-- Heart balloon 3 - Yellow -->
<g class="bh3">
  <path d="M340,136 C340,116 320,106 320,126 C320,106 300,116 300,136 C300,156 340,181 340,181 C340,181 380,156 380,136 C380,116 360,106 360,126 C360,106 340,116 340,136Z" fill="#FFD600"/>
  <ellipse cx="328" cy="128" rx="9" ry="6" fill="#FFF176" opacity="0.5"/>
  <path d="M340 181 Q336 198 340 214 Q344 228 337 243" stroke="#FFD600" stroke-width="2" fill="none"/>
</g>

<!-- Heart balloon 4 - Purple -->
<g class="bh4">
  <path d="M465,142 C465,122 445,112 445,132 C445,112 425,122 425,142 C425,162 465,187 465,187 C465,187 505,162 505,142 C505,122 485,112 485,132 C485,112 465,122 465,142Z" fill="#BF00FF"/>
  <ellipse cx="453" cy="134" rx="8" ry="5" fill="#DF80FF" opacity="0.5"/>
  <path d="M465 187 Q461 204 465 220 Q469 234 462 249" stroke="#BF00FF" stroke-width="2" fill="none"/>
</g>

<!-- Heart balloon 5 - Cyan -->
<g class="bh5">
  <path d="M570,148 C570,128 550,118 550,138 C550,118 530,128 530,148 C530,168 570,193 570,193 C570,193 610,168 610,148 C610,128 590,118 590,138 C590,118 570,128 570,148Z" fill="#00E5FF"/>
  <ellipse cx="558" cy="140" rx="8" ry="5" fill="#80F0FF" opacity="0.5"/>
  <path d="M570 193 Q566 210 570 226 Q574 240 567 255" stroke="#00E5FF" stroke-width="2" fill="none"/>
</g>

<!-- HAPPY BIRTHDAY -->
<g class="hb">
  <text x="340" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="44" font-weight="900" fill="url(#hbg)" letter-spacing="2">Happy Birthday</text>
  <text x="340" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="44" font-weight="900" fill="none" stroke="#fff" stroke-width="0.8" letter-spacing="2" opacity="0.2">Happy Birthday</text>
</g>

<!-- I LOVE YOU -->
<g class="ily">
  <text x="340" y="348" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="url(#ily)" font-style="italic" letter-spacing="1">I Love You</text>
  <text x="340" y="348" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="none" stroke="#fff" stroke-width="0.6" font-style="italic" letter-spacing="1" opacity="0.2">I Love You</text>
</g>

<!-- ROMA -->
<g class="roma">
  <text x="340" y="428" text-anchor="middle" font-family="Georgia, serif" font-size="80" font-weight="900" fill="url(#roma)" letter-spacing="10">Roma</text>
  <text x="340" y="428" text-anchor="middle" font-family="Georgia, serif" font-size="80" font-weight="900" fill="none" stroke="#fff" stroke-width="1.2" letter-spacing="10" opacity="0.2">Roma</text>
</g>

<!-- Big beating heart -->
<g class="bigheart">
  <path d="M340,510 C340,488 314,476 314,498 C314,476 288,488 288,510 C288,534 340,558 340,558 C340,558 392,534 392,510 C392,488 366,476 366,498 C366,476 340,488 340,510Z" fill="#FF2D78"/>
  <ellipse cx="322" cy="499" rx="12" ry="7" fill="#FF79A8" opacity="0.5"/>
  <circle cx="340" cy="510" r="30" fill="#FF2D78" opacity="0.1"/>
</g>

<!-- Floating hearts -->
<g class="fh1"><text x="62" y="510" font-size="28" fill="#FF2D78" opacity="0.8">♥</text></g>
<g class="fh2"><text x="595" y="500" font-size="24" fill="#BF00FF" opacity="0.8">♥</text></g>
<g class="fh3"><text x="38" y="580" font-size="18" fill="#FFD600" opacity="0.7">♥</text></g>
<g class="fh4"><text x="630" y="572" font-size="20" fill="#00E5FF" opacity="0.7">♥</text></g>
<g class="fh5"><text x="160" y="598" font-size="14" fill="#39FF14" opacity="0.6">♥</text></g>
<g class="fh6"><text x="500" y="602" font-size="16" fill="#FF6B00" opacity="0.6">♥</text></g>

<!-- Side hearts near Roma -->
<text x="128" y="422" font-size="22" fill="#FF2D78" class="s3" opacity="0.7">♥</text>
<text x="534" y="422" font-size="22" fill="#FFD600" class="s5" opacity="0.7">♥</text>

<!-- Bottom line -->
<line x1="60" y1="650" x2="620" y2="650" stroke="#FF2D78" stroke-width="1.5" opacity="0.4" stroke-dasharray="8,6"/>
<circle cx="60" cy="650" r="4" fill="#FF2D78" opacity="0.7"/>
<circle cx="340" cy="650" r="5" fill="#FFD600" opacity="0.8"/>
<circle cx="620" cy="650" r="4" fill="#BF00FF" opacity="0.7"/>
<text x="28" y="668" font-size="16" fill="#FF2D78" opacity="0.5">♥</text>
<text x="630" y="668" font-size="16" fill="#00E5FF" opacity="0.5">♥</text>
</svg>
</div>
</body>
</html>
